<div #container class="df-calendar-wrapper"></div>

<div style="display: none">
  @for (rendering of customRenderings(); track rendering.id) {
    @if (getTemplate(rendering.generatorName); as template) {
      <div [appPortal]="rendering.containerEl">
        <ng-container *ngTemplateOutlet="template; context: { $implicit: rendering.generatorArgs }" />
      </div>
    }
  }
</div>
