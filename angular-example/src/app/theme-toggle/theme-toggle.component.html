<div class="flex shrink-0 items-center gap-4">
  <button type="button" (click)="toggleTheme()"
    class="flex items-center gap-2 rounded-lg border border-gray-200 bg-white px-4 py-2 text-gray-700 shadow-sm transition-colors hover:bg-gray-50 dark:border-slate-700 dark:bg-slate-800 dark:text-gray-200 dark:hover:bg-slate-700">
    @if (isDark()) {
      <lucide-angular [name]="Sun" [size]="18" />
    } @else {
      <lucide-angular [name]="Moon" [size]="18" />
    }
    <span class="text-sm font-medium">
      {{ isDark() ? "Light" : "Dark" }}
    </span>
  </button>
</div>
